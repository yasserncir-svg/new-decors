<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Caisse - {{ settings.site_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FFD700;
            --primary-dark: #DAA520;
            --dark: #1A1A2E;
            --gray: #6B6B7B;
            --gray-light: #F5F5F5;
            --white: #FFFFFF;
            --success: #27ae60;
            --danger: #e74c3c;
            --shadow: 0 5px 20px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: var(--dark); }

        /* Header */
        .caisse-header {
            background: var(--white);
            padding: 12px 20px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo h1 { font-size: 22px; font-weight: 800; color: var(--primary-dark); }
        .logo p { font-size: 9px; color: var(--gray); }
        .header-info { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .ticket-number { background: var(--primary); padding: 6px 14px; border-radius: 30px; font-weight: bold; font-size: 13px; }
        .date-time { font-size: 12px; color: var(--gray); }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 6px 14px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 12px; }

        /* Container */
        .caisse-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @media (min-width: 1024px) {
            .caisse-container { flex-direction: row; }
            .products-panel { flex: 2; }
            .cart-panel { flex: 1; position: sticky; top: 80px; }
        }

        /* Search */
        .search-bar { margin-bottom: 15px; }
        .search-bar input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }

        /* Catégories - scroll horizontal */
        .category-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 15px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .category-tab {
            background: var(--white);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            white-space: nowrap;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .category-tab.active { background: var(--primary); color: var(--dark); }

        /* Grille produits */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 5px;
        }
        @media (min-width: 768px) {
            .products-grid { max-height: calc(100vh - 280px); overflow-y: auto; }
        }
        .product-item {
            background: var(--white);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }
        .product-item:active { transform: scale(0.98); }
        .product-image {
            width: 70px;
            height: 70px;
            margin: 0 auto 8px;
            background: var(--gray-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; word-break: break-word; }
        .product-price { color: var(--primary-dark); font-weight: 700; font-size: 14px; }
        .product-stock { font-size: 10px; color: var(--gray); margin-top: 4px; }

        /* Panier */
        .cart-panel {
            background: var(--white);
            border-radius: 20px;
            padding: 15px;
            box-shadow: var(--shadow);
        }
        .cart-header {
            border-bottom: 2px solid var(--primary);
            padding-bottom: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .cart-header h3 { font-size: 18px; }
        .clear-cart { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 12px; }
        .cart-items { max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .cart-item {
            display: flex;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            align-items: center;
            flex-wrap: wrap;
        }
        .cart-item-info { flex: 1; min-width: 100px; }
        .cart-item-name { font-weight: 600; font-size: 13px; }
        .cart-item-price-input {
            width: 80px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: right;
            font-size: 13px;
        }
        .cart-item-quantity { display: flex; align-items: center; gap: 6px; }
        .cart-qty-btn {
            width: 28px; height: 28px;
            border: 1px solid #ddd;
            background: var(--white);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .cart-item-total { font-weight: 700; font-size: 13px; min-width: 60px; text-align: right; color: var(--success); }
        .cart-item-remove { color: var(--danger); cursor: pointer; background: none; border: none; font-size: 16px; }

        /* Client section */
        .client-section {
            background: var(--gray-light);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .client-section h4 { margin-bottom: 10px; font-size: 14px; }
        .client-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .client-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .client-row input { flex: 1; min-width: 120px; }

        /* Paiement */
        .payment-section { border-top: 1px solid #eee; padding-top: 15px; }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .total-amount { color: var(--primary-dark); font-size: 26px; }
        .payment-input label { display: block; margin-bottom: 5px; font-size: 12px; }
        .payment-input input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 18px;
            text-align: right;
        }
        .change-row {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 10px;
            margin: 12px 0;
            font-size: 14px;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--dark);
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-submit:active { transform: scale(0.98); }

        /* Numpad */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        .numpad-btn {
            padding: 12px;
            background: var(--gray-light);
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .numpad-btn:active { background: var(--primary); transform: scale(0.95); }

        .empty-cart { text-align: center; padding: 30px; color: var(--gray); }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 1000;
            font-size: 14px;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .caisse-header { flex-direction: column; text-align: center; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .product-image { width: 55px; height: 55px; }
            .product-name { font-size: 11px; }
            .product-price { font-size: 12px; }
            .cart-item { flex-wrap: wrap; }
            .cart-item-total { margin-left: auto; }
            .client-row { flex-direction: column; }
            .client-row input { width: 100%; }
            .total-amount { font-size: 22px; }
            .numpad-btn { padding: 10px; font-size: 18px; }
        }

        /* Styles pour le champ quantité */
        .cart-qty-input {
            width: 55px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px;
            font-size: 13px;
        }
        .cart-qty-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Alerte personnalisée */
        .custom-alert {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .custom-alert-content {
            background: white;
            border-radius: 24px;
            max-width: 350px;
            width: 90%;
            padding: 25px;
            text-align: center;
            animation: fadeInUp 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border-top: 5px solid #e74c3c;
        }
        .custom-alert-icon {
            font-size: 48px;
            color: #e74c3c;
            margin-bottom: 15px;
        }
        .custom-alert-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #e74c3c;
        }
        .custom-alert-message {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .custom-alert-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            text-align: left;
        }
        .custom-alert-details p {
            margin: 5px 0;
            font-size: 14px;
        }
        .custom-alert-details .total {
            color: #e74c3c;
            font-weight: 700;
            font-size: 16px;
        }
        .custom-alert-details .received {
            color: #f39c12;
            font-weight: 700;
        }
        .custom-alert-details .missing {
            color: #e74c3c;
            font-weight: 700;
        }
        .custom-alert-button {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .custom-alert-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231,76,60,0.3);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive pour l'alerte sur mobile */
        @media (max-width: 480px) {
            .custom-alert-content {
                width: 90%;
                padding: 20px;
                margin: 20px;
            }
            .custom-alert-title {
                font-size: 18px;
            }
            .custom-alert-details p {
                font-size: 12px;
            }
            .custom-alert-button {
                padding: 10px 20px;
                font-size: 13px;
            }
        }
        /* Style mobile pour le panier */
        @media (max-width: 480px) {
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding: 12px 0;
            }
            .cart-item-info {
                width: 100%;
            }
            .cart-item-quantity {
                width: 100%;
                justify-content: space-between;
            }
            .cart-item-total {
                width: 100%;
                text-align: left;
                font-size: 16px;
                margin-top: 5px;
            }
            .cart-item-remove {
                position: absolute;
                right: 5px;
                top: 5px;
            }
            .cart-item {
                position: relative;
            }
            .cart-item-unit-price {
                font-size: 12px !important;
            }
        }
        /* Style pour le panier avec prix modifiable */
        .cart-item {
            display: flex;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            align-items: flex-start;
            flex-wrap: wrap;
            position: relative;
        }
        .cart-item-info {
            flex: 1;
            min-width: 120px;
        }
        .cart-item-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .cart-item-price, .cart-item-quantity, .cart-item-total {
            flex: 1;
            min-width: 80px;
        }
        .cart-item-price-input, .cart-qty-input {
            width: 80px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
        }
        .cart-item-remove {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }
        
        @media (max-width: 600px) {
            .cart-item {
                flex-direction: column;
                gap: 8px;
            }
            .cart-item-price, .cart-item-quantity, .cart-item-total {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .cart-item-price label, .cart-item-quantity label, .cart-item-total label {
                width: 80px;
            }
            .cart-item-remove {
                position: absolute;
                top: 5px;
                right: 5px;
            }
        }
    </style>
</head>
<body>

<div class="caisse-header">
    <div class="logo">
        <h1>{{ settings.site_name }}</h1>
        <p>SYSTÈME DE CAISSE</p>
    </div>
    <div class="header-info">
        <div class="ticket-number" id="ticketNumberDisplay">TICKET-001</div>
        <div class="date-time" id="dateTime"></div>
        <a href="/admin?tab=dashboard" class="btn-logout">📊 Admin</a>
        <a href="/logout" class="btn-logout">🚪 Quitter</a>
    </div>
</div>

<div class="caisse-container">
    <div class="products-panel">
        <div class="search-bar">
            <input type="text" id="searchProduct" placeholder="🔍 Rechercher un produit...">
        </div>
        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-category="all">📦 Tous</button>
            {% for cat in categories %}
            <button class="category-tab" data-category="{{ cat.id }}">{{ cat.icon }} {{ cat.name }}</button>
            {% endfor %}
        </div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div class="cart-panel">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> Panier</h3>
            <button class="clear-cart" onclick="clearCart()"><i class="fas fa-trash"></i> Vider</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">🛒 Panier vide</div>
        </div>

        <div class="client-section">
            <h4><i class="fas fa-user"></i> Informations client</h4>
            <input type="text" id="clientName" class="client-input" placeholder="Nom du client *">
            <div class="client-row">
                <input type="tel" id="clientPhone" class="client-input" placeholder="Téléphone *">
                <input type="text" id="clientAddress" class="client-input" placeholder="Adresse">
            </div>
        </div>

        <div class="payment-section">
            <div class="total-row">
                <span>TOTAL</span>
                <span class="total-amount" id="totalAmount">0.00 DNT</span>
            </div>
            <div class="payment-input">
                <label>💰 Montant reçu</label>
                <input type="number" id="amountReceived" step="0.01" placeholder="0.00" value="0">
                <div class="numpad" id="numpad">
                    <button class="numpad-btn" data-value="1">1</button>
                    <button class="numpad-btn" data-value="2">2</button>
                    <button class="numpad-btn" data-value="3">3</button>
                    <button class="numpad-btn" data-value="4">4</button>
                    <button class="numpad-btn" data-value="5">5</button>
                    <button class="numpad-btn" data-value="6">6</button>
                    <button class="numpad-btn" data-value="7">7</button>
                    <button class="numpad-btn" data-value="8">8</button>
                    <button class="numpad-btn" data-value="9">9</button>
                    <button class="numpad-btn" data-value="0">0</button>
                    <button class="numpad-btn" data-value=".">.</button>
                    <button class="numpad-btn" data-value="clear">C</button>
                </div>
            </div>
            <div class="change-row" id="changeRow">
                <strong>🔄 Monnaie à rendre:</strong> <span id="changeAmount">0.00 DNT</span>
            </div>
            <button class="btn-submit" onclick="validateSale()">
                <i class="fas fa-receipt"></i> VALIDER ET IMPRIMER
            </button>
        </div>
    </div>
</div>

<script>
    let products = [];
    let cart = [];
    let currentTicketNumber = 'TICKET-001';
    let subcategoriesData = [];

    async function loadProducts() {
        try {
            const response = await fetch('/admin/products');
            const data = await response.json();
            products = data.products || [];
            
            // Charger les sous-catégories pour le filtrage
            const catsResponse = await fetch('/admin/categories');
            const catsData = await catsResponse.json();
            subcategoriesData = catsData.subcategories || [];
            
            renderProducts();
        } catch (error) {
            console.error('Erreur:', error);
            document.getElementById('productsGrid').innerHTML = '<div style="text-align:center; padding:40px; color:red;">❌ Erreur chargement</div>';
        }
    }

    async function loadLastTicket() {
        try {
            const response = await fetch('/admin/stock-out/last-ticket');
            const data = await response.json();
            if (data.numero) {
                currentTicketNumber = data.numero;
                document.getElementById('ticketNumberDisplay').innerText = currentTicketNumber;
            }
        } catch (error) {}
    }

    function updateDateTime() {
        const now = new Date();
        document.getElementById('dateTime').innerHTML = now.toLocaleDateString('fr-FR') + ' ' + now.toLocaleTimeString('fr-FR');
    }

    function renderProducts() {
        const searchTerm = document.getElementById('searchProduct').value.toLowerCase();
        const activeCategory = document.querySelector('.category-tab.active')?.dataset.category || 'all';

        if (!products || products.length === 0) {
            document.getElementById('productsGrid').innerHTML = '<div style="text-align:center; padding:40px;">📦 Aucun produit</div>';
            return;
        }

        let filtered = products.filter(p => {
            if (!p.active) return false;
            const matchSearch = (p.name && p.name.toLowerCase().includes(searchTerm)) || 
                               (p.reference && p.reference.toLowerCase().includes(searchTerm));
            
            let matchCategory = false;
            if (activeCategory === 'all') {
                matchCategory = true;
            } else {
                const subcat = subcategoriesData.find(s => s.id == p.subcategory_id);
                if (subcat) {
                    matchCategory = subcat.category_id == activeCategory;
                }
            }
            
            return matchSearch && matchCategory;
        });

        const grid = document.getElementById('productsGrid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="text-align:center; padding:40px;">🔍 Aucun produit</div>';
            return;
        }

        grid.innerHTML = filtered.map(p => {
            const price = (p.prix_promo && p.prix_promo > 0) ? p.prix_promo : p.prix_vente;
            const isOutOfStock = p.stock <= 0;
            const onclickAttr = isOutOfStock ? '' : `onclick="addToCart(${p.id}, '${(p.name || '').replace(/'/g, "\\'")}', ${price}, ${p.stock})"`;
            
            let imageUrl = '';
            if (p.image) {
                if (p.image.startsWith('http')) {
                    imageUrl = p.image;
                } else {
                    imageUrl = '/uploads/medium/' + p.image;
                }
            }
            
            return `
            <div class="product-item" style="${isOutOfStock ? 'opacity:0.5;' : ''}" ${onclickAttr}>
                <div class="product-image">
                    ${imageUrl ? `<img src="${imageUrl}" alt="${p.name}">` : '<i class="fas fa-image" style="font-size: 24px; color:#ccc;"></i>'}
                </div>
                <div class="product-name">${p.name || ''}</div>
                <div class="product-price">${price.toFixed(2)} DNT</div>
                <div class="product-stock">Stock: ${p.stock}</div>
                ${isOutOfStock ? '<div style="color:red; font-size:9px;">RUPTURE</div>' : ''}
            </div>`;
        }).join('');
    }

    function addToCart(id, name, price, stock) {
        if (stock <= 0) {
            alert('❌ Stock insuffisant');
            return;
        }
        const existing = cart.find(item => item.id === id);
        if (existing) {
            if (existing.quantity + 1 > stock) {
                alert(`❌ Stock insuffisant !\n\nProduit: ${name}\nStock disponible: ${stock} unités`);
                return;
            }
            existing.quantity++;
        } else {
            cart.push({id, name, price, quantity: 1});
        }
        renderCart();
        updateTotal();
    }
    function renderCart() {
        const container = document.getElementById('cartItems');
        if (cart.length === 0) {
            container.innerHTML = '<div class="empty-cart">🛒 Panier vide</div>';
            return;
        }
        container.innerHTML = cart.map((item) => {
            const product = products.find(p => p.id == item.id);
            const maxStock = product ? product.stock : 999;
            
            return `
            <div class="cart-item" data-product-id="${item.id}">
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                </div>
                <div class="cart-item-price">
                    <label style="font-size: 11px; color: #666;">💰 Prix unitaire</label>
                    <input type="number" step="0.01" class="cart-item-price-input" value="${item.price.toFixed(2)}" onchange="updatePrice('${item.id}', this.value)" style="width: 90px; padding: 6px; border: 1px solid #ddd; border-radius: 6px; text-align: right;">
                </div>
                <div class="cart-item-quantity">
                    <label style="font-size: 11px; color: #666;">📦 Qté</label>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <button class="cart-qty-btn" onclick="updateQuantity('${item.id}', -1)">-</button>
                        <input type="number" class="cart-qty-input" id="qty-${item.id}" value="${item.quantity}" min="1" max="${maxStock}" style="width: 55px; text-align: center; border: 1px solid #ddd; border-radius: 6px; padding: 6px;" onchange="updateQuantityManually('${item.id}', this.value)">
                        <button class="cart-qty-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                    </div>
                </div>
                <div class="cart-item-total">
                    <label style="font-size: 11px; color: #666;">💵 Total</label>
                    <div style="font-weight: 700; color: var(--success); font-size: 14px;">${(item.price * item.quantity).toFixed(2)} DNT</div>
                </div>
                <button class="cart-item-remove" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i></button>
            </div>
        `}).join('');
    }
    function updateQuantity(productId, delta) {
        const item = cart.find(i => i.id == productId);
        if (item) {
            const newQty = item.quantity + delta;
            const product = products.find(p => p.id == productId);
            const maxStock = product ? product.stock : 999;
            
            if (newQty <= 0) {
                cart = cart.filter(i => i.id != productId);
            } else if (newQty > maxStock) {
                alert(`❌ Stock insuffisant !\n\nProduit: ${item.name}\nStock disponible: ${maxStock} unités`);
                return;
            } else {
                item.quantity = newQty;
            }
        }
        renderCart();
        updateTotal();
    }
    function updateQuantityManually(productId, newQuantity) {
        let qty = parseInt(newQuantity);
        
        // Vérifier si la valeur est valide
        if (isNaN(qty) || qty < 1) {
            qty = 1;
        }
        
        const item = cart.find(i => i.id == productId);
        if (!item) return;
        
        const product = products.find(p => p.id == productId);
        const maxStock = product ? product.stock : 999;
        
        // Vérifier que la quantité ne dépasse pas le stock
        if (qty > maxStock) {
            alert(`❌ Stock insuffisant !\n\nProduit: ${item.name}\nStock disponible: ${maxStock} unités\nQuantité demandée: ${qty}`);
            // Remettre la valeur correcte
            document.getElementById(`qty-${productId}`).value = item.quantity;
            return;
        }
        
        // Mettre à jour la quantité
        item.quantity = qty;
        renderCart();
        updateTotal();
    }

    function updatePrice(productId, newPrice) {
        const item = cart.find(i => i.id == productId);
        if (item) {
            const newPriceValue = parseFloat(newPrice) || 0;
            if (newPriceValue <= 0) {
                alert('Le prix doit être supérieur à 0');
                return;
            }
            item.price = newPriceValue;
        }
        renderCart();
        updateTotal();
    }
    function removeFromCart(productId) {
        cart = cart.filter(i => i.id != productId);
        renderCart();
        updateTotal();
    }
    function clearCart() {
        if (confirm('Vider le panier ?')) {
            cart = [];
            renderCart();
            updateTotal();
        }
    }

    function updateTotal() {
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        document.getElementById('totalAmount').innerHTML = total.toFixed(2) + ' DNT';
        calculateChange();
    }

    function calculateChange() {
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const received = parseFloat(document.getElementById('amountReceived').value) || 0;
        const change = received - total;
        const changeSpan = document.getElementById('changeAmount');
        const submitBtn = document.querySelector('.btn-submit');
        const totalSpan = document.getElementById('totalAmount');
        
        if (change >= 0) {
            changeSpan.innerHTML = change.toFixed(2) + ' DNT';
            changeSpan.style.color = '#27ae60';
            if (submitBtn) submitBtn.style.opacity = '1';
            if (totalSpan) totalSpan.style.color = '';
        } else {
            changeSpan.innerHTML = '⚠️ Manque ' + Math.abs(change).toFixed(2) + ' DNT';
            changeSpan.style.color = '#e74c3c';
            if (submitBtn) submitBtn.style.opacity = '0.6';
            if (totalSpan) totalSpan.style.color = '#e74c3c';
        }
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function printTicket(ticketNumber, clientName, clientPhone, clientAddress, productList, total, amountReceived, change) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('fr-FR');
        const timeStr = now.toLocaleTimeString('fr-FR');
        const printContent = `
            <html>
            <head><title>Ticket ${ticketNumber}</title>
            <style>
                body { font-family: monospace; padding: 20px; }
                .ticket { max-width: 300px; margin: 0 auto; }
                .header { text-align: center; border-bottom: 1px dashed #000; }
                .line { border-top: 1px dashed #000; margin: 10px 0; }
                .total { font-weight: bold; font-size: 18px; }
                .thankyou { text-align: center; margin-top: 20px; }
            </style>
            </head>
            <body>
            <div class="ticket">
                <div class="header">
                    <h3>NEW DECORS</h3>
                    <small>Décoration d'intérieur</small>
                </div>
                <p><strong>Ticket:</strong> ${ticketNumber}</p>
                <p><strong>Date:</strong> ${dateStr} ${timeStr}</p>
                <div class="line"></div>
                <p><strong>Client:</strong> ${clientName}</p>
                <p><strong>Tél:</strong> ${clientPhone}</p>
                <p><strong>Adresse:</strong> ${clientAddress || '-'}</p>
                <div class="line"></div>
                <p><strong>Articles:</strong> ${productList}</p>
                <div class="line"></div>
                <p class="total"><strong>TOTAL:</strong> ${total.toFixed(2)} DNT</p>
                <p>Montant reçu: ${amountReceived.toFixed(2)} DNT</p>
                <p>Monnaie: ${change >= 0 ? change.toFixed(2) : 'Manque ' + Math.abs(change).toFixed(2)} DNT</p>
                <div class="line"></div>
                <div class="thankyou">MERCI DE VOTRE VISITE !</div>
            </div>
            <script>
                window.print();
                window.onafterprint = function() { window.close(); };
            <\/script>
            </body>
            </html>
        `;
        const printWindow = window.open('', '_blank', 'width=400,height=500');
        if (printWindow) {
            printWindow.document.write(printContent);
            printWindow.document.close();
        } else {
            alert("Autorisez les popups pour imprimer");
        }
    }
    async function validateSale() {
        if (cart.length === 0) {
            alert('Panier vide');
            return;
        }
        
        const clientName = document.getElementById('clientName').value.trim();
        const clientPhone = document.getElementById('clientPhone').value.trim();
        const clientAddress = document.getElementById('clientAddress').value.trim();
        
        if (!clientName || !clientPhone) {
            alert('Nom et téléphone requis');
            return;
        }
        
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const amountReceived = parseFloat(document.getElementById('amountReceived').value) || 0;
        const change = amountReceived - total;
        
        // ✅ BLOQUER LA VENTE si montant insuffisant
        if (amountReceived < total) {
            alert(`❌ Montant insuffisant !\n\nTotal: ${total.toFixed(2)} DNT\nReçu: ${amountReceived.toFixed(2)} DNT\nManque: ${(total - amountReceived).toFixed(2)} DNT`);
            document.getElementById('amountReceived').focus();
            return;
        }
        
        // Vérification du stock
        for (let item of cart) {
            const product = products.find(p => p.id == item.id);
            if (!product || product.stock < item.quantity) {
                alert(`Stock insuffisant pour: ${item.name}\nStock disponible: ${product?.stock || 0}`);
                return;
            }
        }
        
        // Enregistrement des ventes
        for (let item of cart) {
            const formData = new FormData();
            formData.append('product_id', item.id);
            formData.append('client_name', clientName);
            formData.append('client_phone', clientPhone);
            formData.append('client_email', '');
            formData.append('client_address', clientAddress);
            formData.append('quantity', item.quantity);
            formData.append('sale_price', item.price);
            formData.append('notes', `Vente caisse - ${new Date().toLocaleString()}`);
            
            const response = await fetch('/admin/stock-out', { method: 'POST', body: formData });
            const result = await response.json();
            if (!result.success) {
                alert(`Erreur: ${item.name}`);
                return;
            }
        }
        
        // Impression du ticket
        const ticketNumber = document.getElementById('ticketNumberDisplay').innerText;
        const productList = cart.map(item => `${item.name} x${item.quantity}`).join(', ');
        printTicket(ticketNumber, clientName, clientPhone, clientAddress, productList, total, amountReceived, change);
        
        // Réinitialisation
        cart = [];
        renderCart();
        updateTotal();
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('clientAddress').value = '';
        document.getElementById('amountReceived').value = '0';
        
        const match = ticketNumber.match(/\d+$/);
        if (match) {
            const num = parseInt(match[0]) + 1;
            document.getElementById('ticketNumberDisplay').innerText = `TICKET-${num.toString().padStart(3, '0')}`;
        }
        
        await loadProducts();
        showToast('✅ Vente enregistrée !');
    }
    document.getElementById('searchProduct').addEventListener('input', renderProducts);
    document.querySelectorAll('.category-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts();
        });
    });
    document.getElementById('amountReceived').addEventListener('input', calculateChange);
    document.querySelectorAll('.numpad-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const value = btn.dataset.value;
            const input = document.getElementById('amountReceived');
            if (value === 'clear') {
                input.value = '';
            } else {
                input.value += value;
            }
            calculateChange();
        });
    });

    updateDateTime();
    setInterval(updateDateTime, 1000);
    loadProducts();
    loadLastTicket();
</script>
</body>
</html>
